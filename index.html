<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <!-- https://www.figma.com/design/L84jql623nZIdtdsoSLcoT/100--Travel-Landing-website-templates--Community-?node-id=0-1&p=f&t=UYxFR7AfkLJZ4gVH-0 -->
</head>
<body>
    <header>
        <div class="container">
            <div class="header__logo">
                <div class="logo_img">
                    <a href="#"><img src="logo-1.svg" alt="Travel"></a>
                </div>
                <div class="header__search">
                    <input type="search" placeholder="Search destinations or activities">
                </div>
            </div>
            <div class="header__right">
                <div class="headerDropdown__button">
                    <div class="Destinations">
                        <a href="#">Destinations</a>
                    </div>
                </div>
                <div class="headerDropdown__button">
                    <div class="Activities">
                        <a href="#">Activities</a>
                    </div>
                </div>
                <div class="headerDropdown__button">
                    <div class="USD">
                        <a href="#">USD</a>
                    </div>
                </div>
                <div class="headerDropdown__button"></div>
                    <div class="Sign_up">
                        <a href="#">Sign up</a>
                    </div>
                </div>
                <div class="log_in">
                    <a href="#">Log in</a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section>
            <div class="sec-1">
                <div class="searchForm__form">
                    <div class="searchFormItem__button">
                        <div class="searchFormItem__icon"></div>
                        <div class="searchFormItem__content">
                            <h3>Where</h3>
                            <p>Search destinations</p>
                        </div>
                    </div>
                    <div class="searchFormItem__button">
                        <div class="searchFormItem__icon"></div>
                        <div class="searchFormItem__content">
                            <h3>When</h3>
                            <p>February 05 ~ March 14</p>
                        </div>
                    </div>
                    <div class="searchFormItem__button">
                        <div class="searchFormItem__icon"></div>
                        <div class="searchFormItem__content">
                            <h3>Tour Type</h3>
                            <p>All Tour</p>
                        </div>
                    </div>
                </div>
                <button>Search</button>
            </div>
        </section>
        <div class="text-main">
            <h1>Your world of joy</h1>
            <p>From local escapes to far-flung adventures, find what makes you happy anytime, anywhere</p>
        </div>
        <section>
            <div class="sec-2">
                <div class="bg-img"></div>
                <div class="bg-img-shape"></div>
            </div>
        </section>
    </main>
</body>
</html>
